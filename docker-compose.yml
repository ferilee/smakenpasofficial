services:
  web:
    build: .
    ports:
      - "2005:2005"
    environment:
      PORT: 2005
      DATABASE_URL: /app/data/app.db
      UPLOAD_DIR: /app/uploads
      TOKEN_SECRET: ganti-secret-produksi
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads

  rustfs:
    image: rustfs/rustfs:latest
    profiles:
      - storage
    ports:
      - "9000:9000"
    volumes:
      - ./rustfs-data:/data
